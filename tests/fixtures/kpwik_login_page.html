function WHCreateCookie(name, value, days) {
        var date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        var expires = "; expires=" + date.toGMTString();
	    document.cookie = name+"="+value+expires+"; path=/";
    }
    function WHReadCookie(name) {
	    var nameEQ = name + "=";
	    var ca = document.cookie.split(';');
	    for(var i=0; i < ca.length; i++) {
		    var c = ca[i];
		    while (c.charAt(0) == ' ') c = c.substring(1, c.length);
		    if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
	    }
	    return null;
    }
    window.onload = WHCheckCookies;
    function WHCheckCookies() {
        if(WHReadCookie('cookies_accepted') != 'T') {
            var message_container = document.createElement('div');
            message_container.id = 'cookies-message-container';
            var html_code = '<div id="cookies-message" style="font-weight:bold; opacity: 0.9; padding: 10px 0px; font-size: 125%; border-bottom: 1px solid #CCCCCC; text-align: center; position: fixed; bottom: 0; background-color: #FFFFFF; width: 100%; z-index: 999;">Ta strona używa ciasteczek (cookies), dzięki którym nasz serwis może działać lepiej. <a href="/apex/r/ebok/e/polityka_prywatnosci?clear=RP,97&cs=3JC_2BKAte3cJ9C4dIbTG0UgMjue2tXQBNf3N_YEXmeWfMD8U1TlcEERd_BvWd6K7nH_Ii_4iqEskW07hjp4Vsg">Dowiedz się więcej.</a> <button class="t-Button t-Button--hot t-Button--large" onclick="javascript:WHCloseCookiesWindow();" type="button" id="accept-cookies-checkbox" name="accept-cookies"><span class="t-Button-label">Rozumiem</span></button></div>';
            message_container.innerHTML = html_code;
            document.body.appendChild(message_container);
        }
    }
    function WHCloseCookiesWindow() {
        WHCreateCookie('cookies_accepted', 'T', 365);
        document.getElementById('cookies-message-container').removeChild(document.getElementById('cookies-message'));
    }
